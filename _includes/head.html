<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="msvalidate.01" content="33C81F1538C1B2B31CB7870109F8449F">

  <!-- SEO description -->
  {% if page.description %}
    <meta name="description" content="{{ page.description }}">
  {% elsif page.title == "Home" %}
    <meta name="description" content="{{ site.description }}">
  {% else %}
    <meta name="description" content="{{ site.description }}">
  {% endif %}

  <!-- Open Graph -->
  <meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url"         content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name"   content="{{ site.title }}">
  <meta property="og:image"       content="{{ site.url }}/public/og-default.png">

  <!-- Twitter Cards -->
  {% if site.twitter_username %}
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:site"        content="@{{ site.twitter_username }}">
  <meta name="twitter:creator"     content="@{{ site.twitter_username }}">
  <meta name="twitter:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image"       content="{{ site.url }}/public/og-default.png">
  {% endif %}

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- Prevent flash of unstyled theme -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch(e) {}
    })();
  </script>

  <!-- Fonts: Inter + Instrument Serif + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/public/css/syntax.css">
  <link rel="stylesheet" href="/public/css/site.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
  <link rel="shortcut icon" href="/public/favicon.svg">

  <!-- Atom feed -->
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/atom.xml">

  {% include analytics.html %}
</head>
