- name: clipboard-history
  description: A super lightweight clipboard history manager for macOS built with only built-in dependencies - two scripts running locally. Browse and paste anything you've copied recently, triggered from any app via an Automator Quick Action. No third-party apps, no cloud sync, no need to trust anyone with sensitive data.
  tech: [Python, Shell, macOS, Automator]
  url: https://github.com/pabasara-mahindapala/clipboard-history
  status: active

- name: ContactBook
  description: Reference implementation of the CQRS pattern in ASP.NET Core Web API. Separates read and write models so each can scale and evolve independently - Commands mutate state, Queries retrieve it, with no crossover. The companion code for the blog post on CQRS in ASP.NET Core.
  tech: [C#, ASP.NET Core, CQRS, .NET]
  url: https://github.com/pabasara-mahindapala/ContactBook
  blog_post: /2024/07/26/implementing-cqrs-in-asp-net-core-separating-read-and-write-operations-for-scalability-and-performance/
  status: reference

